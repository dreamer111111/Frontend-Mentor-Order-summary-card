<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Order summary card</title>
  </head>
  <body>
      <article class="card">
        <img src="./images/illustration-hero.svg" alt="" class="hero-img" />

        <div class="card-body">
          <h1 class="hero-title">Order Summary</h1>
          <p class="hero-description">
            You can now listen to millions of songs, audiobooks, and podcasts on
            any device anywhere you like!
          </p>

          <section class="plan-container">
            <div class="plan-info">
              <img src="./images/icon-music.svg" alt="Music Icon" />
              <div class="plan-text">
                <span class="plan-name">Annual Plan</span>
                <span class="plan-price">$59.99/year</span>
              </div>
            </div>
            <a href="#" class="change-link">Change</a>
          </section>

          <div class="actions">
            <button type="button" class="proceed-btn">
              Proceed to Payment
            </button>
            <button type="button" class="cancel-btn">Cancel Order</button>
          </div>
        </div>
      </article>
  </body>
</html>
